<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TechNexus - Welcome</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 20px; color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 350px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        h2 { color: #764ba2; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>🚀 TechNexus</h2>
        <p>Connect. Build. Level Up.</p>
        <form id="loginForm">
            <input type="text" id="userName" placeholder="Full Name" required>
            <input type="email" id="userEmail" placeholder="Email Address" required>
            <button type="submit">Enter Dashboard →</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                eventsCreated: 0
            };
            localStorage.setItem('technexusUser', JSON.stringify(user));
            window.location.href = 'dashboard.html'; 
        });
    </script>
</body>
</html>
